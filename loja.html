        <section>
            <form action="" method="post">
                <fieldset>
                    <legend>Dados do Usuário</legend>
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome!">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required minlength="6">
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" min="18" required>
                </fieldset>
                <fieldset>
                    <legend>Categorias e Preferencias</legend>
                    <label for="categoria">Categoria de Interesse:</label>
                    <select name="categoria" id="categoria">
                        <option value="pranchas">Pranchas</option>
                        <option value="long jhon">Long Jhon</option>
                        <option value="acessórios">Acessórios</option>
                        <option value="parafinas">Parafinas</option>
                        <option value="quilhas">Quilhas</option>
                    </select>
                    <br>
                    <label for="preferencias">Preferencias:</label>
                    <label><input type="checkbox" name="promo">Receber promoções por email</label>
                    <label><input type="checkbox" name="novidades">Receber novidades por email</label></label>
                </fieldset>
                <fieldset>
                    <legend>Tipo de Cliente</legend>
                    <label for="">
                        <input type="radio" name="tipo" value="pf" required>Pessoa Física</label>
                    </label>
                    <label for=""><input type="radio" name="tipo" value="pj">Pessoa Jurídica</label>
                </fieldset>
                <fieldset>
                    <legend>Mensagem</legend>
                    <textarea name="mensagem" id="mensagem"></textarea>
                </fieldset>
                <button type="submit">Enviar Formulário</button>
            </form>
        </section>

        <section id="contato">
